<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dota 2 Overlay</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="overlay-container">
    <!-- Status Indicator -->
    <div id="status-indicator" class="status-indicator">
      <div class="status-dot"></div>
      <span id="status-text">Conectando...</span>
    </div>

    <!-- Draft Analysis Panel -->
    <div id="draft-panel" class="panel hidden">
      <div class="panel-header draft-header" id="draft-header">
        <h2>COMPOSIÇÃO & EFICIÊNCIA</h2>
        <div class="header-controls">
          <button id="minimize-draft" class="minimize-btn" title="Minimizar">−</button>
          <button id="close-draft" class="close-btn" title="Fechar">✕</button>
        </div>
      </div>
      <div id="draft-content" class="draft-content">
      
      <div class="teams-container">
        <!-- Radiant Team -->
        <div class="team radiant">
          <div class="team-header">
            <span class="team-name">RADIANT</span>
            <span class="team-score">0%</span>
          </div>
          <div id="radiant-heroes" class="heroes-list"></div>
        </div>

        <!-- Dire Team -->
        <div class="team dire">
          <div class="team-header">
            <span class="team-name">DIRE</span>
            <span class="team-score">0%</span>
          </div>
          <div id="dire-heroes" class="heroes-list"></div>
        </div>
      </div>

      <!-- Strategy Section -->
      <div class="strategy-section">
        <h3>PLANOS DE VITÓRIA</h3>
        <div class="strategy-boxes">
          <div class="strategy-box radiant-strategy">
            <h4>RADIANT PLAN</h4>
            <div id="radiant-strategy" class="strategy-content">
              <p>Analisando composição...</p>
            </div>
          </div>
          <div class="strategy-box dire-strategy">
            <h4>DIRE PLAN</h4>
            <div id="dire-strategy" class="strategy-content">
              <p>Analisando composição...</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Strategic Connections -->
      <div class="connections-section">
        <h3>CONEXÕES ESTRATÉGICAS</h3>
        <div id="connections" class="connections-content">
          <p>Aguardando dados da partida...</p>
        </div>
      </div>
      </div>
    </div>

    <!-- In-Game Overlay -->
    <div id="game-overlay" class="panel hidden">
      <div class="power-balance">
        <div class="balance-bar">
          <div id="radiant-power" class="radiant-bar" style="width: 50%">
            <span class="power-percent">50%</span>
          </div>
          <div id="dire-power" class="dire-bar" style="width: 50%">
            <span class="power-percent">50%</span>
          </div>
        </div>
      </div>
      
      <div class="concept-box">
        <p id="game-concept">Aguardando análise estratégica...</p>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
